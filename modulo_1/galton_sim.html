<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vera Galton Board</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --peg-color: #bdc3c7;
            --ball-color: #e74c3c;
            --bar-color: #3498db;
        }
        body { font-family: sans-serif; margin: 0; display: flex; justify-content: center; background: var(--bg-color); }
        .container { width: 100%; max-width: 600px; text-align: center; padding: 10px; }
        .controls { margin-bottom: 15px; }
        button { padding: 10px 20px; cursor: pointer; border-radius: 5px; border: none; background: #2c3e50; color: white; font-weight: bold; }
        button:hover { background: #34495e; }
        canvas { border: 1px solid #eee; border-radius: 8px; background: #fff; max-width: 100%; }
    </style>
</head>
<body>

<div class="container">
    <div class="controls">
        <button onclick="launchBall()">▶ Lancia Pallina</button>
        <button onclick="launchMany(10)">+10 Palline</button>
        <button onclick="resetSim()" style="background:#95a5a6">Reset</button>
    </div>
    <canvas id="galtonCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('galtonCanvas');
    const ctx = canvas.getContext('2d');

    const config = {
        layers: 10,        // Numero di file di pioli
        ballRadius: 6,
        pegRadius: 3,
        gravity: 0.2,
        damping: 0.5,      // Rimbalzo
        spacing: 40        // Spazio tra i pioli
    };

    let width, height;
    let pegs = [];
    let balls = [];
    let bins = new Array(config.layers + 1).fill(0);

    function init() {
        width = canvas.width = 500;
        height = canvas.height = 650;
        createPegs();
        draw();
    }

    function createPegs() {
        pegs = [];
        const startY = 80;
        for (let i = 0; i < config.layers; i++) {
            const rowY = startY + i * config.spacing;
            const rowXStart = width / 2 - (i * config.spacing) / 2;
            for (let j = 0; j <= i; j++) {
                pegs.push({ x: rowXStart + j * config.spacing, y: rowY });
            }
        }
    }

    class Ball {
        constructor() {
            this.x = width / 2 + (Math.random() - 0.5); // Quasi perfettamente al centro
            this.y = 30;
            this.vx = 0;
            this.vy = 0;
            this.settled = false;
        }

        update() {
            if (this.settled) return;

            this.vy += config.gravity;
            this.x += this.vx;
            this.y += this.vy;

            // Collisione con i pioli
            pegs.forEach(peg => {
                const dx = this.x - peg.x;
                const dy = this.y - peg.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < config.ballRadius + config.pegRadius) {
                    const angle = Math.atan2(dy, dx);
                    // Forza il rimbalzo verso il basso e di lato
                    this.vx += Math.cos(angle) * 2 + (Math.random() - 0.5) * 0.5;
                    this.vy = Math.abs(Math.sin(angle)) * 2 + 1; 
                    // Sposta la pallina fuori dal piolo per evitare incastri
                    this.x = peg.x + Math.cos(angle) * (config.ballRadius + config.pegRadius);
                    this.y = peg.y + Math.sin(angle) * (config.ballRadius + config.pegRadius);
                }
            });

            // Arrivo in fondo
            const binAreaY = 80 + config.layers * config.spacing + 20;
            if (this.y > binAreaY) {
                this.settled = true;
                const binWidth = config.spacing;
                const binIndex = Math.round((this.x - (width / 2 - (config.layers * binWidth) / 2)) / binWidth);
                const safeIndex = Math.max(0, Math.min(config.layers, binIndex));
                bins[safeIndex]++;
            }
        }

        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, config.ballRadius, 0, Math.PI*2);
            ctx.fillStyle = "#e74c3c";
            ctx.fill();
            ctx.closePath();
        }
    }

    function draw() {
        ctx.clearRect(0, 0, width, height);

        // Disegna Pioli
        ctx.fillStyle = "#bdc3c7";
        pegs.forEach(peg => {
            ctx.beginPath();
            ctx.arc(peg.x, peg.y, config.pegRadius, 0, Math.PI*2);
            ctx.fill();
        });

        // Disegna Istogramma (Canali)
        const binWidth = config.spacing;
        const startX = width / 2 - (config.layers * binWidth) / 2;
        const baseY = height - 20;

        for (let i = 0; i <= config.layers; i++) {
            const h = bins[i] * 10; // Altezza barra
            ctx.fillStyle = "#3498db";
            ctx.fillRect(startX + i * binWidth - binWidth/4, baseY - h, binWidth/2, h);
            
            // Disegna linee canali
            ctx.strokeStyle = "#eee";
            ctx.strokeRect(startX + i * binWidth - binWidth/2, baseY - 150, binWidth, 150);
        }

        // Aggiorna e disegna palline
        balls.forEach((ball, index) => {
            ball.update();
            ball.draw();
            if (ball.settled && ball.y > height + 100) balls.splice(index, 1);
        });

        requestAnimationFrame(draw);
    }

    function launchBall() { balls.push(new Ball()); }
    function launchMany(n) { for(let i=0; i<n; i++) setTimeout(launchBall, i*100); }
    function resetSim() { bins.fill(0); balls = []; }

    init();
</script>
</body>
</html>
