<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galton Board Gaussiana</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --peg-color: #7f8c8d;
            --ball-color: #e74c3c;
            --bar-color: #3498db;
            --text-color: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-color);
        }

        .galton-container {
            width: 95%;
            max-width: 600px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        .controls {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background-color: var(--text-color);
            color: white;
            transition: opacity 0.2s;
        }

        .btn-launch { background-color: var(--ball-color); }
        .btn-reset { background-color: #95a5a6; }
        button:hover { opacity: 0.8; }

        .canvas-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 130%; 
            height: 0;
            border: 1px solid #eee;
            border-radius: 8px;
        }

        #galtonCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

<div class="galton-container">
    <h2>La Galton Board</h2>
    <p>Le palline rimbalzano e formano una Distribuzione Normale (Gaussiana).</p>
    
    <div class="controls">
        <button class="btn-launch" onclick="launchBall()">▶ Lancia 1</button>
        <button class="btn-launch" onclick="launchBatch(15)">▶ Lancia 15</button>
        <button class="btn-reset" onclick="resetSim()">🔄 Reset</button>
    </div>

    <div class="canvas-wrapper">
        <canvas id="galtonCanvas"></canvas>
    </div>
</div>

<script>
    const config = {
        rows: 10,            
        pegRadius: 3,        
        ballRadius: 6,       
        gravity: 0.2,        
        elasticity: 0.4,    
        friction: 0.98       
    };

    const canvas = document.getElementById('galtonCanvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    let pegs = [];
    let balls = [];
    let buckets = [];

    function init() {
        const wrapper = canvas.parentElement;
        width = canvas.width = wrapper.offsetWidth;
        height = canvas.height = wrapper.offsetHeight;
        buckets = new Array(config.rows + 1).fill(0);
        createPegs();
        draw();
    }

    function createPegs() {
        pegs = [];
        const startY = height * 0.15;
        const spacingY = (height * 0.5) / config.rows;
        const spacingX = width / (config.rows + 2);

        for (let r = 0; r < config.rows; r++) {
            const y = startY + r * spacingY;
            const rowWidth = r * spacingX;
            const xStart = (width - rowWidth) / 2;

            for (let c = 0; c <= r; c++) {
                pegs.push({ x: xStart + c * spacingX, y: y });
            }
        }
    }

    class Ball {
        constructor() {
            this.x = width / 2 + (Math.random() - 0.5);
            this.y = height * 0.05;
            this.vx = 0;
            this.vy = 0;
            this.finished = false;
        }

        update() {
            if (this.finished) return;

            this.vy += config.gravity;
            this.vx *= config.friction;
            this.x += this.vx;
            this.y += this.vy;

            pegs.forEach(peg => {
                const dx = this.x - peg.x;
                const dy = this.y - peg.y;
                const dist = Math.sqrt(dx*dx + dy*dy);

                if (dist < config.ballRadius + config.pegRadius) {
                    this.y = peg.y - config.pegRadius; 
                    this.vy *= -config.elasticity;
                    
                    // Logica Gaussiana: forza deviazione binaria
                    if (Math.abs(dx) < 1) {
                        this.vx = (Math.random() > 0.5 ? 1.5 : -1.5);
                    } else {
                        this.vx = dx * 0.8;
                    }
                }
            });

            const floorY = height * 0.75;
            if (this.y > floorY) {
                this.finished = true;
                const binWidth = width / (config.rows + 1);
                let idx = Math.round((this.x - (width/2 - (config.rows * binWidth)/2)) / binWidth);
                idx = Math.max(0, Math.min(config.rows, idx));
                buckets[idx]++;
            }
        }

        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, config.ballRadius, 0, Math.PI * 2);
            ctx.fillStyle = "#e74c3c";
            ctx.fill();
            ctx.closePath();
        }
    }

    function draw() {
        ctx.clearRect(0, 0, width, height);

        // Istogramma
        const binWidth = width / (config.rows + 1);
        const startX = (width - (config.rows + 1) * binWidth) / 2;
        const floorY = height * 0.98;

        for (let i = 0; i < buckets.length; i++) {
            const h = buckets[i] * 15; // Altezza barre
            ctx.fillStyle = "#3498db80";
            ctx.fillRect(startX + i * binWidth + 2, floorY - h, binWidth - 4, h);
            ctx.strokeStyle = "#eee";
            ctx.strokeRect(startX + i * binWidth, height * 0.75, binWidth, height * 0.23);
        }

        // Pioli
        ctx.fillStyle = "#bdc3c7";
        pegs.forEach(p => {
            ctx.beginPath();
            ctx.arc(p.x, p.y, config.pegRadius, 0, Math.PI * 2);
            ctx.fill();
        });

        // Palline
        balls.forEach((b, i) => {
            b.update();
            b.draw();
            if (b.finished && b.y > height) balls.splice(i, 1);
        });

        requestAnimationFrame(draw);
    }

    function launchBall() { balls.push(new Ball()); }
    
    function launchBatch(n) {
        let count = 0;
        const int = setInterval(() => {
            launchBall();
            count++;
            if (count >= n) clearInterval(int);
        }, 100);
    }

    function resetSim() {
        buckets.fill(0);
        balls = [];
    }

    window.addEventListener('resize', init);
    init();
</script>
</body>
</html>
