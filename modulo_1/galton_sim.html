<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galton Board Calibrata</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --peg-color: #94a3b8;
            --ball-color: #ef4444;
            --bar-color: #3b82f6;
        }
        body { font-family: system-ui, sans-serif; margin: 0; display: flex; justify-content: center; background: var(--bg-color); }
        .galton-container { width: 100%; max-width: 600px; background: white; padding: 20px; text-align: center; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .controls { margin-bottom: 20px; display: flex; justify-content: center; gap: 8px; }
        button { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; transition: all 0.2s; }
        .btn-l { background: var(--ball-color); color: white; }
        .btn-r { background: #64748b; color: white; }
        canvas { border: 1px solid #e2e8f0; border-radius: 8px; width: 100%; height: auto; }
    </style>
</head>
<body>

<div class="galton-container">
    <h3>Simulazione Statistica Galton</h3>
    <div class="controls">
        <button class="btn-l" onclick="launchBall()">Lancia Pallina</button>
        <button class="btn-l" onclick="launchBatch(20)">Lancia 20x</button>
        <button class="btn-r" onclick="resetSim()">Reset</button>
    </div>
    <canvas id="galtonCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('galtonCanvas');
    const ctx = canvas.getContext('2d');

    const config = {
        rows: 11,           
        ballR: 5,           
        pegR: 3,            
        gravity: 0.2,       
        friction: 0.96,     // Più attrito per frenare le palline laterali
        bounce: 0.2,        // Elasticità molto bassa per evitare l'effetto flipper
        spacingX: 48,       
        spacingY: 42        
    };

    let width, height, pegs = [], balls = [], buckets = [];

    function init() {
        width = canvas.width = 540;
        height = canvas.height = 700;
        buckets = new Array(config.rows + 1).fill(0);
        createPegs();
        animate();
    }

    function createPegs() {
        pegs = [];
        const startY = 80;
        for (let i = 0; i < config.rows; i++) {
            const rowY = startY + i * config.spacingY;
            const rowWidth = i * config.spacingX;
            const xStart = width / 2 - rowWidth / 2;
            for (let j = 0; j <= i; j++) {
                pegs.push({ x: xStart + j * config.spacingX, y: rowY });
            }
        }
    }

    class Ball {
        constructor() {
            this.x = width / 2 + (Math.random() - 0.5) * 2;
            this.y = 30;
            this.vx = 0;
            this.vy = 0;
            this.done = false;
        }

        update() {
            if (this.done) return;

            this.vy += config.gravity;
            this.vx *= config.friction;
            this.x += this.vx;
            this.y += this.vy;

            // Collisione con i pioli
            for (let p of pegs) {
                const dx = this.x - p.x;
                const dy = this.y - p.y;
                const d = Math.sqrt(dx*dx + dy*dy);
                
                if (d < config.ballR + config.pegR) {
                    // Risoluzione collisione "soft"
                    const angle = Math.atan2(dy, dx);
                    // Forza la pallina a cadere o a destra o a sinistra
                    this.vx = (dx > 0 ? 1 : -1) * (1 + Math.random() * 1);
                    this.vy *= config.bounce;
                    this.y = p.y + Math.sin(angle) * (config.ballR + config.pegR);
                }
            }

            // Arrivo nei canali
            const floorY = height - 160;
            if (this.y > floorY) {
                this.done = true;
                const startX = width / 2 - (config.rows * config.spacingX) / 2;
                let idx = Math.round((this.x - startX) / config.spacingX);
                idx = Math.max(0, Math.min(config.rows, idx));
                buckets[idx]++;
            }
        }

        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, config.ballR, 0, Math.PI*2);
            ctx.fillStyle = "#ef4444";
            ctx.fill();
        }
    }

    function animate() {
        ctx.clearRect(0, 0, width, height);

        // Disegna Istogramma
        const bW = config.spacingX;
        const sX = width / 2 - (config.rows * bW) / 2;
        const maxH = 140;
        const maxC = Math.max(...buckets, 1);

        for (let i = 0; i <= config.rows; i++) {
            const h = (buckets[i] / (maxC + 5)) * maxH * 2; // Scala dinamica
            ctx.fillStyle = "#3b82f6";
            ctx.fillRect(sX + i * bW - bW/3, height - 20 - h, (bW/3)*2, h);
            
            ctx.strokeStyle = "#e2e8f0";
            ctx.strokeRect(sX + i * bW - bW/2, height - 160, bW, 140);
        }

        // Disegna Pioli
        ctx.fillStyle = "#94a3b8";
        pegs.forEach(p => {
            ctx.beginPath();
            ctx.arc(p.x, p.y, config.pegR, 0, Math.PI*2);
            ctx.fill();
        });

        // Aggiorna Palline
        balls.forEach((b, i) => {
            b.update();
            b.draw();
            if (b.done && b.y > height) balls.splice(i, 1);
        });

        requestAnimationFrame(animate);
    }

    function launchBall() { balls.push(new Ball()); }
    function launchBatch(n) { 
        let c = 0;
        const timer = setInterval(() => { launchBall(); c++; if(c>=n) clearInterval(timer); }, 100);
    }
    function resetSim() { buckets.fill(0); balls = []; }

    init();
</script>
</body>
</html>
