<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galton Board Simulation</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --peg-color: #7f8c8d;
            --ball-color: #e74c3c;
            --bar-color: #3498db;
            --text-color: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        .galton-container {
            width: 100%;
            max-width: 800px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 10px;
        }

        .controls {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-launch {
            background-color: var(--ball-color);
            color: white;
        }

        .btn-launch:hover {
            background-color: #c0392b;
        }

        .btn-reset {
            background-color: #95a5a6;
            color: white;
        }

        .btn-reset:hover {
            background-color: #7f8c8d;
        }

        .canvas-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 125%; /* Aspect Ratio 4:5 */
            height: 0;
            overflow: hidden;
            border: 2px solid #ddd;
            border-radius: 8px;
            background-color: #fff;
        }

        #galtonCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

<div class="galton-container">
    <h2>La Galton Board</h2>
    <p>Guarda le palline cadere e formare una Distribuzione Binomiale.</p>
    
    <div class="controls">
        <button class="btn-launch" onclick="launchBall()">▶ Lancia Pallina</button>
        <button class="btn-reset" onclick="resetSim()">🔄 Reset</button>
    </div>

    <div class="canvas-wrapper">
        <canvas id="galtonCanvas"></canvas>
    </div>
</div>

<script>
    // --- Configurazione della Simulazione ---
    const config = {
        rows: 12,            // Livelli di pioli
        pegRadius: 4,        // Dimensione pioli
        ballRadius: 7,       // Dimensione pallina
        gravity: 0.25,       // Forza di gravità
        elasticity: 0.6,    // Rimbalzo (0-1)
        friction: 0.99       // Attrito dell'aria (0-1)
    };

    const canvas = document.getElementById('galtonCanvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    let pegs = [];
    let balls = [];
    let buckets = [];
    let animationId;

    // --- Inizializzazione ---
    function init() {
        // Rendi il canvas responsive prendendo le dimensioni dal wrapper CSS
        const wrapper = canvas.parentElement;
        width = canvas.width = wrapper.offsetWidth;
        height = canvas.height = wrapper.offsetHeight;

        createPegs();
        createBuckets();
        startAnimation();
    }

    // --- Creazione degli Oggetti ---
    function createPegs() {
        pegs = [];
        const startY = height * 0.1;
        const endY = height * 0.7;
        const rowHeight = (endY - startY) / config.rows;
        
        for (let r = 0; r < config.rows; r++) {
            const y = startY + r * rowHeight;
            const cols = r + 1;
            const rowWidth = width * 0.8;
            const startX = (width - rowWidth) / 2;
            const colWidth = rowWidth / cols;

            for (let c = 0; c < cols; c++) {
                pegs.push({
                    x: startX + c * colWidth + colWidth / 2,
                    y: y,
                    r: config.pegRadius
                });
            }
        }
    }

    function createBuckets() {
        buckets = new Array(config.rows + 1).fill(0);
    }

    // --- Logica della Pallina ---
    class Ball {
        constructor() {
            this.x = width / 2 + (Math.random() - 0.5) * 5; // Piccolo offset casuale in cima
            this.y = height * 0.05;
            this.vx = (Math.random() - 0.5) * 1; // Velocità orizzontale iniziale casuale
            this.vy = 0;
            this.r = config.ballRadius;
            this.isFinished = false;
        }

        update() {
            if (this.isFinished) return;

            // Applica gravità e attrito
            this.vy += config.gravity;
            this.vx *= config.friction;
            this.vy *= config.friction;

            // Aggiorna posizione
            this.x += this.vx;
            this.y += this.vy;

            // Collisione con i pioli
            for (let peg of pegs) {
                const dx = this.x - peg.x;
                const dy = this.y - peg.y;
                const dist = Math.sqrt(dx*dx + dy*dy);

                if (dist < this.r + peg.r) {
                    // Risolvi compenetrazione
                    const overlap = (this.r + peg.r - dist);
                    const nx = dx / dist; // Vettore normale
                    const ny = dy / dist;
                    this.x += nx * overlap;
                    this.y += ny * overlap;

                    // Calcola rimbalzo (riflessione del vettore velocità)
                    const dotProduct = this.vx * nx + this.vy * ny;
                    this.vx = (this.vx - 2 * dotProduct * nx) * config.elasticity;
                    this.vy = (this.vy - 2 * dotProduct * ny) * config.elasticity;

                    // Aggiungi un bias casuale per forzare destra/sinistra (cruciale per Galton)
                    this.vx += (Math.random() - 0.5) * 0.5;
                }
            }

            // Collisione con i muri laterali
            if (this.x < this.r) {
                this.x = this.r;
                this.vx *= -0.5;
            } else if (this.x > width - this.r) {
                this.x = width - this.r;
                this.vx *= -0.5;
            }

            // Arrivo nei canali in basso
            const floorY = height * 0.75;
            if (this.y > floorY && !this.isFinished) {
                this.isFinished = true;
                const bucketWidth = (width * 0.8) / (config.rows + 1);
                const startX = width * 0.1;
                const index = Math.floor((this.x - startX) / bucketWidth);
                const safeIndex = Math.max(0, Math.min(config.rows, index));
                buckets[safeIndex]++;
                
                // Rimuovi la pallina dopo un po' per pulizia (opzionale)
                setTimeout(() => {
                    balls = balls.filter(b => b !== this);
                }, 500);
            }
        }

        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
            ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--ball-color');
            ctx.fill();
            ctx.closePath();
        }
    }

    // --- Rendering ---
    function draw() {
        ctx.clearRect(0, 0, width, height); // Pulisci canvas

        // Disegna Istogramma (sfondo dei canali)
        const bucketWidth = (width * 0.8) / (config.rows + 1);
        const startX = width * 0.1;
        const floorY = height * 0.75;
        const maxBucketHeight = height * 0.23;
        const maxCount = Math.max(...buckets, 1);

        for (let i = 0; i < buckets.length; i++) {
            const count = buckets[i];
            const barHeight = (count / maxCount) * maxBucketHeight;
            const x = startX + i * bucketWidth;
            
            // Colore barra
            ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--bar-color') + "80"; // 50% opacity
            ctx.fillRect(x + 2, floorY - barHeight, bucketWidth - 4, barHeight);
            
            // Linee di divisione canali
            ctx.strokeStyle = "#ddd";
            ctx.lineWidth = 1;
            ctx.strokeRect(x, floorY - maxBucketHeight, bucketWidth, maxBucketHeight);
        }

        // Disegna Pioli
        ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--peg-color');
        for (let peg of pegs) {
            ctx.beginPath();
            ctx.arc(peg.x, peg.y, peg.r, 0, Math.PI * 2);
            ctx.fill();
            ctx.closePath();
        }

        // Disegna e aggiorna Palline
        for (let ball of balls) {
            ball.update();
            ball.draw();
        }

        animationId = requestAnimationFrame(draw);
    }

    // --- Controlli ---
    function startAnimation() {
        if (!animationId) {
            draw();
        }
    }

    function launchBall() {
        if (balls.length < 50) { // Limite per performance
            balls.push(new Ball());
        }
    }

    function resetSim() {
        balls = [];
        createBuckets();
    }

    // Gestione ridimensionamento finestra
    window.addEventListener('resize', init);

    // Avvio
    init();

</script>

</body>
</html>
