<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulazione Monte Carlo π</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --in: #3498db;
            --out: #e74c3c;
        }
        body { font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: var(--primary); background: #f8fafc; margin: 0; padding: 20px; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); max-width: 900px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
        
        .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .metric-box { background: #f1f5f9; padding: 15px; border-radius: 8px; text-align: center; }
        .metric-value { display: block; font-size: 1.5rem; font-weight: bold; color: var(--accent); }
        .metric-label { font-size: 0.8rem; text-transform: uppercase; color: #64748b; }

        canvas { background: white; border: 1px solid #e2e8f0; border-radius: 8px; width: 100%; height: auto; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
        button { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: all 0.2s; }
        .btn-start { background: var(--accent); color: white; }
        .btn-reset { background: #94a3b8; color: white; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
    </style>
</head>
<body>

<div class="card">
    <div class="metrics">
        <div class="metric-box">
            <span class="metric-label">Punti Totali</span>
            <span id="m-total" class="metric-value">0</span>
        </div>
        <div class="metric-box">
            <span class="metric-label">Punti nel Cerchio</span>
            <span id="m-inside" class="metric-value">0</span>
        </div>
        <div class="metric-box">
            <span class="metric-label">Stima π</span>
            <span id="m-pi" class="metric-value">0.00000</span>
        </div>
        <div class="metric-box">
            <span class="metric-label">Errore %</span>
            <span id="m-error" class="metric-value">0%</span>
        </div>
    </div>

    <div class="controls">
        <button class="btn-start" onclick="toggleSimulation()" id="btn-toggle">Avvia Simulazione</button>
        <button class="btn-reset" onclick="resetSim()">Reset</button>
    </div>

    <div class="grid">
        <div>
            <h4 style="margin:0 0 10px 0">Visualizzazione Geometrica</h4>
            <canvas id="geoCanvas" width="400" height="400"></canvas>
        </div>
        <div>
            <h4 style="margin:0 0 10px 0">Convergenza Errore</h4>
            <canvas id="errorCanvas" width="400" height="400"></canvas>
        </div>
    </div>
</div>

<script>
    const geoCanvas = document.getElementById('geoCanvas');
    const errCanvas = document.getElementById('errorCanvas');
    const gCtx = geoCanvas.getContext('2d');
    const eCtx = errCanvas.getContext('2d');

    let total = 0, inside = 0, running = false, history = [];
    const PI_REAL = Math.PI;

    function toggleSimulation() {
        running = !running;
        document.getElementById('btn-toggle').innerText = running ? 'Pausa' : 'Riprendi';
        if (running) loop();
    }

    function resetSim() {
        running = false;
        total = 0; inside = 0; history = [];
        document.getElementById('btn-toggle').innerText = 'Avvia Simulazione';
        gCtx.clearRect(0, 0, 400, 400);
        eCtx.clearRect(0, 0, 400, 400);
        updateMetrics();
        drawStaticBoard();
    }

    function drawStaticBoard() {
        gCtx.strokeStyle = '#e2e8f0';
        gCtx.beginPath();
        gCtx.arc(200, 200, 200, 0, Math.PI * 2);
        gCtx.stroke();
    }

    function updateMetrics() {
        const piEst = total === 0 ? 0 : (4 * (inside / total));
        const errPerc = total === 0 ? 0 : Math.abs((piEst - PI_REAL) / PI_REAL * 100);
        
        document.getElementById('m-total').innerText = total.toLocaleString();
        document.getElementById('m-inside').innerText = inside.toLocaleString();
        document.getElementById('m-pi').innerText = piEst.toFixed(5);
        document.getElementById('m-error').innerText = errPerc.toFixed(2) + '%';
        
        if (total % 10 === 0 && total > 0) history.push(piEst - PI_REAL);
        if (history.length > 200) history.shift();
    }

    function drawErrorGraph() {
        eCtx.clearRect(0, 0, 400, 400);
        eCtx.strokeStyle = '#cbd5e1';
        eCtx.beginPath(); eCtx.moveTo(0, 200); eCtx.lineTo(400, 200); eCtx.stroke(); // Zero line

        if (history.length < 2) return;
        eCtx.strokeStyle = '#8b5cf6';
        eCtx.lineWidth = 2;
        eCtx.beginPath();
        
        const step = 400 / (history.length - 1);
        history.forEach((err, i) => {
            const x = i * step;
            const y = 200 - (err * 200); // Scale error for visibility
            if (i === 0) eCtx.moveTo(x, y);
            else eCtx.lineTo(x, y);
        });
        eCtx.stroke();
    }

    function loop() {
        if (!running) return;

        // Lanciamo 20 punti per ogni frame per rendere l'animazione veloce
        for (let i = 0; i < 20; i++) {
            const x = Math.random() * 400;
            const y = Math.random() * 400;
            
            const dx = x - 200;
            const dy = y - 200;
            const isInside = (dx*dx + dy*dy) <= 200*200;

            if (isInside) inside++;
            total++;

            gCtx.fillStyle = isInside ? '#3498db' : '#ef4444';
            gCtx.beginPath();
            gCtx.arc(x, y, 1.5, 0, Math.PI * 2);
            gCtx.fill();
        }

        updateMetrics();
        drawErrorGraph();
        requestAnimationFrame(loop);
    }

    drawStaticBoard();
</script>

</body>
</html>
